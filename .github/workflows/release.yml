name: Release

# Push a version tag (e.g. v0.6.0) to build the module tarball and publish
# a GitHub release with the assets. dist/ stays gitignored — CI builds it.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check versions match the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION="$(jq -r .version src/module.json)"
          RELEASE_VERSION="$(jq -r .version release.json)"
          echo "tag=$TAG_VERSION module.json=$MODULE_VERSION release.json=$RELEASE_VERSION"
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ] || [ "$TAG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "::error::Version mismatch — bump src/module.json and release.json to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Build module
        run: bash scripts/build.sh

      - name: Package Bitwig controller script
        run: |
          cd "Controller Scripts"
          zip -r ../dist/move-bitwig-controller-scripts.zip . -x "*.d.ts"
          cd ..
          ls -la dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/move-bitwig-module.tar.gz \
            dist/move-bitwig-controller-scripts.zip
